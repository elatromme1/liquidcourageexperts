name: "Joncarlo Mark"
title: "Founder"
firm: "Upwelling Capital"
bio: "Joncarlo Mark is the Founder of Upwelling Capital and co-host of Liquid Courage, where he regularly brings research-backed insights on private capital secondaries. He developed proprietary analysis showing that private equity fund values tend to peak around year nine, making a compelling case for proactive LP portfolio management. Mark is a vocal advocate for using secondary market tools—including continuation vehicles, structured solutions, and GP-led transactions—to optimize liquidity and returns across a fund's lifecycle."
topics:
  - Fund performance peak analysis and optimal secondary market exit timing
  - Continuation vehicles as mainstream liquidity tools for GPs and LPs
  - Structured secondary solutions including preferred equity and NAV lending
  - Venture capital secondaries and valuation dynamics
  - Downmarket and mid-market continuation vehicle opportunities
  - The evolving role of retail and high-net-worth capital in secondaries
  - LP portfolio management and rebalancing using secondary market tools
  - GP-LP alignment considerations in continuation vehicle transactions
episodeTitle: "Continuation Vehicles are Here for Good, but are LPs Ready to Roll?"
episodeUrl: "https://liquidcouragepod.substack.com/p/continuation-vehicles-are-here-for"
