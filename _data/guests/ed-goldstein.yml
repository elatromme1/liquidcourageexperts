name: "Ed Goldstein"
title: "Partner and Chief Investment Officer, Coller Credit Secondaries"
firm: "Coller Capital"
bio: "Ed Goldstein is the Partner and CIO of Coller Credit Secondaries, a dedicated strategy within Coller Capital focused on the fast-growing private credit secondary market. He explains how credit secondaries have doubled year-over-year, far outpacing the growth of the underlying primary market, and makes the case that nearly half a trillion dollars in mature private credit fund assets are creating compelling secondary buying opportunities. Goldstein brings deep expertise in direct lending, portfolio construction, and the unique dynamics of underwriting credit versus equity secondaries."
topics:
  - Growth trajectory of private credit secondaries vs. private equity secondaries
  - GP-led continuation vehicles in seasoned private credit funds
  - BDC liquidity dynamics and semi-liquid product misconceptions
  - Underwriting performing versus distressed credit portfolios at scale
  - Half-trillion dollars in private credit assets held over five years
  - Concentration of capital among mega-managers versus mid-sized credit firms
  - GP alignment and skin-in-the-game in credit secondary transactions
  - Risk appetite and portfolio construction disciplines in credit secondaries
episodeTitle: "Credit Market Shifts Unlock Secondaries Value"
episodeUrl: "https://liquidcouragepod.substack.com/p/credit-market-shifts-unlock-secondaries"
