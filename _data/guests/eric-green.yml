name: "Eric Green"
title: "Partner"
firm: "Upwelling Capital"
bio: "Eric Green is a Partner at Upwelling Capital who brings deep expertise in private credit markets to the Liquid Courage podcast. With a career spanning the evolution of direct lending from its pre-GFC origins to today's multi-trillion-dollar market, Green offers unique perspective on how credit secondaries are emerging as a critical liquidity channel. He tracks the shifting landscape of mid-sized credit managers and the growing role of GP-led continuation vehicles in the private credit ecosystem."
topics:
  - Evolution of private credit secondaries from distressed-focused to performing credit
  - Mid-sized credit manager fundraising challenges and secondary market solutions
  - GP-led continuation vehicles in private credit funds
  - BDC liquidity dynamics and semi-liquid product misconceptions
  - Growth of private credit allocations among institutional investors
  - Opportunistic secondary strategies during credit market dislocation
  - Transition from bank balance sheet lending to commingled fund structures
episodeTitle: "Credit Market Shifts Unlock Secondaries Value"
episodeUrl: "https://liquidcouragepod.substack.com/p/credit-market-shifts-unlock-secondaries"
