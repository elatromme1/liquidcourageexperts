name: "John Robertshaw"
title: "Managing Director and Vice Chairman, Private Capital Advisory Group"
firm: "Piper Sandler"
bio: "John Robertshaw is a Managing Director and Vice Chairman of the Private Capital Advisory Group at Piper Sandler, with decades of experience in private capital markets including years running Credit Suisse's private equity fundraising operation—one of the world's largest. He was present at the earliest days of the secondary market, having worked alongside the founding teams at Coller Capital and Strategic Partners before they became multi-billion-dollar institutions. Robertshaw sees the rigid structure of private equity fund vehicles as a fundamental flaw that secondaries and continuation vehicles are steadily correcting."
topics:
  - Early history of the private capital secondary market and its formation
  - Continuation vehicles evolving from zombie fund stigma to mainstream exit tool
  - Structural limitations of traditional blind-pool private equity fund design
  - Growth of retail and private wealth channels in alternative investment access
  - Origins of GP-led transactions from hedge fund side-pocket dispositions
  - Tokenization and blockchain as future enablers of private market liquidity
  - How GP consent dynamics have shifted from resistance to welcoming secondaries
  - Secular growth trajectory of alternatives and secondary market volume implications
episodeTitle: "What's Ahead for Secondaries? 'Exponential Growth,' Says Piper Sandler"
episodeUrl: "https://liquidcouragepod.substack.com/p/whats-ahead-for-secondaries-exponential"
